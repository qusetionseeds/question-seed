<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>질문탐구노트 🌱 질문씨앗팀</title>
  <style>
    /* ── 토큰 ── */
    :root {
      --green-900: #1a4731;
      --green-700: #2d6a4f;
      --green-500: #40916c;
      --green-300: #74c69d;
      --green-100: #d8f3dc;
      --green-50:  #f0faf3;
      --amber:     #f4a261;
      --amber-dk:  #e76f51;
      --ink:       #1b2029;
      --ink-mid:   #4a5568;
      --ink-light: #8a96a4;
      --bg:        #f7faf8;
      --white:     #ffffff;
      --border:    #e2ece7;
      --radius-sm: 10px;
      --radius-md: 16px;
      --radius-lg: 24px;
      --shadow-sm: 0 2px 8px rgba(0,0,0,.06);
      --shadow-md: 0 6px 20px rgba(0,0,0,.10);
      --shadow-lg: 0 16px 48px rgba(0,0,0,.15);
      --trans:     0.22s ease;
    }

    /* ── 리셋 / 베이스 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── 헤더 ── */
    .header {
      background: var(--green-900);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
    .header-leaf { font-size: 24px; line-height: 1; }
    .header-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--white);
      letter-spacing: -.3px;
    }
    .header-sub {
      font-size: 11px;
      color: var(--green-300);
      margin-top: 2px;
      letter-spacing: .2px;
    }
    .header-spacer { flex: 1; }
    .header-badge {
      background: var(--green-700);
      color: var(--green-100);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 12px;
      border-radius: 20px;
      display: none;
    }
    .header-badge.visible { display: block; }

    /* ── 컨테이너 ── */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ── 스텝 전환 ── */
    .step { display: none; }
    .step.active { display: block; animation: stepIn .45s cubic-bezier(.22,1,.36,1) both; }
    @keyframes stepIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── 공통 버튼 ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 15px;
      font-weight: 700;
      padding: 13px 26px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      transition: transform var(--trans), box-shadow var(--trans), background var(--trans);
      white-space: nowrap;
      letter-spacing: -.2px;
    }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none !important; }
    .btn-primary {
      background: var(--green-500);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(64,145,108,.35);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--green-700);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(64,145,108,.4);
    }
    .btn-ghost {
      background: transparent;
      color: var(--ink-mid);
      border: 1.5px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) {
      background: var(--green-50);
      border-color: var(--green-300);
      color: var(--green-700);
    }
    .btn-amber {
      background: var(--amber);
      color: var(--white);
      box-shadow: 0 4px 14px rgba(244,162,97,.35);
    }
    .btn-amber:hover:not(:disabled) {
      background: var(--amber-dk);
      transform: translateY(-2px);
    }
    .btn-sm {
      font-size: 13px;
      padding: 9px 18px;
    }
    .btn-full { width: 100%; }

    /* ── 인풋 공통 ── */
    .form-box {
      background: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 28px 28px 24px;
      box-shadow: var(--shadow-sm);
    }
    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--green-700);
      margin-bottom: 7px;
      letter-spacing: .1px;
    }
    .field-hint {
      font-size: 11px;
      color: var(--ink-light);
      margin-top: -5px;
      margin-bottom: 10px;
    }
    select, input[type="text"], textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      color: var(--ink);
      background: var(--bg);
      transition: border-color var(--trans), box-shadow var(--trans);
      appearance: none;
    }
    select:focus, input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: var(--green-500);
      box-shadow: 0 0 0 3px rgba(64,145,108,.15);
    }
    textarea { height: 140px; resize: vertical; line-height: 1.6; }
    .char-counter {
      text-align: right;
      font-size: 11px;
      color: var(--ink-light);
      margin-top: 4px;
    }
    .char-counter.warn { color: #e74c3c; font-weight: 700; }
    .field-row { display: flex; gap: 10px; margin-bottom: 18px; }
    .field-row select { flex: 1; }

    /* ── Step 1: 학번 선택 ── */
    .welcome-icon { font-size: 56px; text-align: center; margin-bottom: 16px; }
    .welcome-title {
      font-size: 24px;
      font-weight: 800;
      text-align: center;
      color: var(--ink);
      letter-spacing: -.5px;
      margin-bottom: 6px;
    }
    .welcome-sub {
      text-align: center;
      font-size: 14px;
      color: var(--ink-light);
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .privacy-note {
      background: var(--green-50);
      border: 1px solid var(--green-100);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      color: var(--green-700);
      margin-top: 16px;
      line-height: 1.5;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: var(--ink-light);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Step 2: 질문 작성 ── */
    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }
    .back-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      line-height: 1;
      transition: transform var(--trans);
    }
    .back-btn:hover { transform: translateX(-3px); }
    .step-title {
      font-size: 20px;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -.4px;
    }

    /* ── Step 3: 게시판 ── */
    .board-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 10px;
      flex-wrap: wrap;
    }
    .count-label {
      font-size: 13px;
      color: var(--ink-light);
    }
    .count-label strong { color: var(--ink); }

    /* 카드 그리드 */
    .board-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 18px 16px;
      cursor: pointer;
      transition: border-color var(--trans), transform var(--trans), box-shadow var(--trans);
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--green-300), var(--green-500));
      opacity: 0;
      transition: opacity var(--trans);
    }
    .card:hover {
      border-color: var(--green-300);
      transform: translateY(-4px);
      box-shadow: var(--shadow-md);
    }
    .card:hover::before { opacity: 1; }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.5;
      margin-bottom: 14px;
      /* 최대 3줄 클램프 */
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-footer {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .like-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--green-50);
      color: var(--green-700);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .comment-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff8f0;
      color: #c67c00;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 20px;
    }
    .empty-state-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { color: var(--ink-light); font-size: 15px; }

    /* ── 로딩 오버레이 ── */
    #loading {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(247,250,248,.88);
      z-index: 9999;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      backdrop-filter: blur(3px);
    }
    #loading.on { display: flex; }
    .loader-leaf { font-size: 52px; animation: pulse 1.4s ease-in-out infinite; }
    .loader-txt { font-size: 15px; font-weight: 700; color: var(--green-700); }
    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(-5deg); }
      50%       { transform: scale(1.18) rotate(5deg); }
    }

    /* ── 모달 ── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
      opacity: 0;
      transition: opacity .25s ease;
    }
    #modal.show { opacity: 1; }
    .modal-sheet {
      background: var(--white);
      width: 100%;
      max-width: 640px;
      max-height: 92vh;
      border-radius: 24px 24px 0 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.22,1,.36,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,.2);
    }
    #modal.show .modal-sheet { transform: translateY(0); }

    /* 모달 핸들 */
    .sheet-handle {
      display: flex;
      justify-content: center;
      padding: 12px 0 6px;
      flex-shrink: 0;
    }
    .sheet-handle-bar {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
    }
    .sheet-header {
      padding: 8px 24px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .sheet-title {
      font-size: 18px;
      font-weight: 800;
      color: var(--ink);
      line-height: 1.4;
      letter-spacing: -.3px;
      margin-bottom: 10px;
    }
    .sheet-close {
      position: absolute;
      top: 16px; right: 20px;
      background: var(--bg);
      border: none;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--ink-light);
      transition: background var(--trans), color var(--trans);
    }
    .sheet-close:hover { background: #fde8e8; color: #e74c3c; }
    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .modal-content-text {
      font-size: 15px;
      line-height: 1.75;
      color: var(--ink-mid);
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 24px;
    }

    /* 모달 액션바 */
    .sheet-action-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 0 0 20px;
      border-bottom: 1px solid var(--border);
    }
    #modalLikeBtn { flex: 1; }

    /* ── 댓글 섹션 ── */
    .comments-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--ink);
      margin-top: 24px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .comments-label .cnt {
      background: var(--green-100);
      color: var(--green-700);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .comment-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      background: var(--green-50);
      margin-bottom: 8px;
    }
    .comment-item.teacher {
      background: #fffbeb;
      border-left: 3px solid var(--amber);
    }
    .comment-item.admin {
      background: #f0f4ff;
      border-left: 3px solid #7986cb;
    }
    .comment-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .comment-author {
      font-size: 12px;
      font-weight: 700;
      color: var(--green-700);
    }
    .comment-item.teacher .comment-author { color: #b45309; }
    .comment-item.admin .comment-author   { color: #3949ab; }
    .comment-ts {
      font-size: 11px;
      color: var(--ink-light);
    }
    .comment-text {
      font-size: 14px;
      color: var(--ink-mid);
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* 댓글 입력 폼 */
    .comment-form {
      margin-top: 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }
    .comment-who {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .who-chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      background: var(--white);
      color: var(--ink-mid);
      transition: border-color var(--trans), background var(--trans), color var(--trans);
    }
    .who-chip.active {
      border-color: var(--green-500);
      background: var(--green-50);
      color: var(--green-700);
    }
    .comment-student-fields { display: none; margin-bottom: 10px; }
    .comment-student-fields.show { display: flex; gap: 8px; }
    .comment-student-fields select { flex: 1; font-size: 13px; padding: 9px 10px; }
    .comment-role-field { display: none; margin-bottom: 10px; }
    .comment-role-field.show { display: block; }
    .comment-input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .comment-input-row textarea {
      height: 68px;
      font-size: 14px;
      flex: 1;
    }
    .comment-submit-btn {
      flex-shrink: 0;
      align-self: flex-end;
    }
    .comment-empty {
      text-align: center;
      padding: 24px 0;
      color: var(--ink-light);
      font-size: 14px;
    }

    /* 토스트 알림 */
    .toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--ink);
      color: var(--white);
      font-size: 14px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 30px;
      z-index: 9999;
      opacity: 0;
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { background: var(--green-700); }
    .toast.error   { background: #c0392b; }
    .toast.warn    { background: var(--amber-dk); }

    /* 스크롤바 */
    .sheet-body::-webkit-scrollbar { width: 4px; }
    .sheet-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── 반응형 ── */
    @media (min-width: 480px) {
      #modal { align-items: center; padding: 20px; }
      .modal-sheet { border-radius: var(--radius-lg); max-height: 88vh; }
    }
    @media (max-width: 480px) {
      .container { padding: 24px 14px 80px; }
      .form-box { padding: 20px 16px; }
      .board-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 340px) {
      .board-grid { grid-template-columns: 1fr; }
    }

    /* 접근성: 포커스 */
    :focus-visible { outline: 2px solid var(--green-500); outline-offset: 2px; }
    @media (prefers-reduced-motion: reduce) {
      *, .step.active, .card, .modal-sheet { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

<!-- ── 로딩 오버레이 ── -->
<div id="loading">
  <div class="loader-leaf">🌱</div>
  <p class="loader-txt">질문 정원 불러오는 중…</p>
</div>

<!-- ── 헤더 ── -->
<header class="header">
  <span class="header-leaf">🌱</span>
  <div>
    <div class="header-title">질문탐구노트</div>
    <div class="header-sub">질문씨앗팀</div>
  </div>
  <div class="header-spacer"></div>
  <div class="header-badge" id="headerBadge">👤 익명</div>
</header>

<!-- ── 메인 컨텐츠 ── -->
<div class="container">

  <!-- Step 1: 학번 선택 -->
  <div id="step1" class="step active">
    <div class="welcome-icon">🌻</div>
    <h1 class="welcome-title">반갑습니다!</h1>
    <p class="welcome-sub">질문을 심거나 친구들의 질문에 싹추를 줄 수 있어요.<br>학번을 선택하고 시작하세요.</p>

    <div class="form-box">
      <label class="field-label">내 학번</label>
      <div class="field-row">
        <select id="grade">
          <option value="">학년</option>
          <script>for(let i=1;i<=3;i++) document.write(`<option value="${i}">${i}학년</option>`)</script>
        </select>
        <select id="class">
          <option value="">반</option>
          <script>for(let i=1;i<=12;i++) document.write(`<option value="${i}">${i}반</option>`)</script>
        </select>
        <select id="num">
          <option value="">번호</option>
          <script>for(let i=1;i<=30;i++) document.write(`<option value="${i}">${i}번</option>`)</script>
        </select>
      </div>
      <button class="btn btn-primary btn-full" onclick="startWithId()">질문 씨앗 심으러 가기 →</button>
      <div class="privacy-note">
        🔒 학번은 중복 싹추 방지에만 사용되며, 게시판에는 익명으로 표시됩니다.
      </div>
    </div>

    <div class="divider">또는</div>
    <button class="btn btn-ghost btn-full" onclick="skipToBoard()">학번 없이 구경만 하기</button>
  </div>

  <!-- Step 2: 질문 작성 -->
  <div id="step2" class="step">
    <div class="step-header">
      <button class="back-btn" onclick="goBack(1)" aria-label="뒤로가기">←</button>
      <h2 class="step-title">새 질문 심기 🌱</h2>
    </div>

    <div class="form-box">
      <label class="field-label" for="qTitle">질문 제목 <span style="color:#c0392b">*</span></label>
      <p class="field-hint">연구하고 싶은 핵심 질문을 한 줄로 적어주세요. (최대 50자)</p>
      <input type="text" id="qTitle" placeholder="예: 인공지능은 인간의 창의성을 대체할 수 있을까?" maxlength="50">
      <div class="char-counter" id="titleCounter">0 / 50</div>

      <label class="field-label" for="qContent" style="margin-top:16px">상세 내용 <span style="color:#c0392b">*</span></label>
      <p class="field-hint">질문의 배경이나 구체적으로 궁금한 점을 적어주세요. (최대 600자)</p>
      <textarea id="qContent" placeholder="질문을 갖게 된 계기나, 탐구해보고 싶은 방향을 자유롭게 써주세요."></textarea>
      <div class="char-counter" id="contentCounter">0 / 600</div>

      <button class="btn btn-primary btn-full" id="submitBtn" onclick="submitQuestion()" style="margin-top:20px">질문 제출하기</button>
    </div>
  </div>

  <!-- Step 3: 게시판 -->
  <div id="step3" class="step">
    <div class="board-toolbar">
      <p class="count-label" id="countInfo"></p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-ghost btn-sm" id="toggleBtn" onclick="toggleMyMode()">내 질문만 보기</button>
        <button class="btn btn-primary btn-sm" onclick="goWrite()">+ 질문 심기</button>
      </div>
    </div>
    <div class="board-grid" id="boardGrid"></div>
  </div>

</div><!-- /container -->

<!-- ── 모달 (바텀 시트) ── -->
<div id="modal" onclick="handleModalBgClick(event)">
  <div class="modal-sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
    <button class="sheet-close" onclick="closeModal()" aria-label="닫기">✕</button>

    <div class="sheet-header">
      <h2 class="sheet-title" id="modalTitle"></h2>
      <div class="sheet-action-bar">
        <button class="btn btn-amber btn-sm" id="modalLikeBtn" onclick="addLike()">🌱 싹추하기 (0)</button>
      </div>
    </div>

    <div class="sheet-body" id="sheetBody">
      <p class="modal-content-text" id="modalBody"></p>

      <!-- 댓글 목록 -->
      <div class="comments-label">
        💬 댓글 <span class="cnt" id="commentCount">0</span>
      </div>
      <div id="commentList"></div>

      <!-- 댓글 작성 폼 -->
      <div class="comment-form">
        <p class="field-label" style="margin-bottom:10px">댓글 달기</p>

        <!-- 신원 선택 칩 -->
        <div class="comment-who">
          <button class="who-chip active" id="chip-student" onclick="selectWho('student')">학생</button>
          <button class="who-chip" id="chip-teacher" onclick="selectWho('teacher')">선생님 🌱</button>
          <button class="who-chip" id="chip-admin"   onclick="selectWho('admin')">관리자 👑</button>
        </div>

        <!-- 학생: 학번 입력 -->
        <div class="comment-student-fields show" id="commentStudentFields">
          <select id="cGrade"><option value="">학년</option><script>for(let i=1;i<=3;i++) document.write(`<option value="${i}">${i}학년</option>`)</script></select>
          <select id="cClass"><option value="">반</option><script>for(let i=1;i<=12;i++) document.write(`<option value="${i}">${i}반</option>`)</script></select>
          <select id="cNum"><option value="">번호</option><script>for(let i=1;i<=30;i++) document.write(`<option value="${i}">${i}번</option>`)</script></select>
        </div>

        <!-- 선생님/관리자: 비밀번호 -->
        <div class="comment-role-field" id="commentRoleField">
          <input type="password" id="roleKey" placeholder="전용 비밀번호를 입력하세요">
        </div>

        <div class="comment-input-row">
          <textarea id="commentText" placeholder="댓글을 입력하세요 (최대 300자)" maxlength="300"></textarea>
          <button class="btn btn-primary btn-sm comment-submit-btn" id="commentSubmitBtn" onclick="submitComment()">게시</button>
        </div>
        <div class="char-counter" id="commentCounter">0 / 300</div>
      </div>
    </div><!-- /sheet-body -->
  </div>
</div><!-- /modal -->

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
//  설정값 — 여기만 바꾸면 됩니다
// ════════════════════════════════════════════════
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEucaAFr7mnhbE4lVl0ONyfUCP3NLGtRYHBm9V557SM7HqvIcLNiqtU_i-fy3Ys0oKbg/exec";
const AUTH_KEY   = "YourSuperSecretToken123!";

// ════════════════════════════════════════════════
//  상태
// ════════════════════════════════════════════════
let myInfo         = {};          // { grade, class, num }
let allQuestions   = [];
let isMyMode       = false;
let currentQ       = null;        // 현재 열린 모달 질문
let commentWho     = 'student';   // 'student' | 'teacher' | 'admin'

// ════════════════════════════════════════════════
//  유틸
// ════════════════════════════════════════════════
function showLoading(on) {
  document.getElementById('loading').classList.toggle('on', on);
}

function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = 'toast', 2600);
}

function goStep(n) {
  document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
  document.getElementById('step' + n).classList.add('active');
  if (n === 3) fetchQuestions();
}

function updateHeaderBadge() {
  const badge = document.getElementById('headerBadge');
  if (myInfo.grade) {
    badge.textContent = `👤 ${myInfo.grade}-${myInfo.class}-${myInfo.num}`;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

function fmtTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  if (isNaN(d)) return ts;
  const pad = n => String(n).padStart(2, '0');
  return `${d.getMonth()+1}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ════════════════════════════════════════════════
//  Step 이동
// ════════════════════════════════════════════════
function startWithId() {
  const g = document.getElementById('grade').value;
  const c = document.getElementById('class').value;
  const n = document.getElementById('num').value;
  if (!g || !c || !n) { toast('학번을 모두 선택해주세요!', 'warn'); return; }
  myInfo = { grade: g, class: c, num: n };
  updateHeaderBadge();
  goStep(2);
}

function skipToBoard() {
  myInfo = {};
  updateHeaderBadge();
  goStep(3);
}

function goBack(n) { goStep(n); }

function goWrite() {
  if (!myInfo.grade) {
    toast('질문을 심으려면 학번이 필요해요!', 'warn');
    goStep(1);
    return;
  }
  goStep(2);
}

// ════════════════════════════════════════════════
//  글자수 카운터
// ════════════════════════════════════════════════
document.getElementById('qTitle').addEventListener('input', function() {
  const n = this.value.length;
  const el = document.getElementById('titleCounter');
  el.textContent = `${n} / 50`;
  el.className = 'char-counter' + (n >= 45 ? ' warn' : '');
});
document.getElementById('qContent').addEventListener('input', function() {
  const n = this.value.length;
  const el = document.getElementById('contentCounter');
  el.textContent = `${n} / 600`;
  el.className = 'char-counter' + (n >= 550 ? ' warn' : '');
});
document.getElementById('commentText').addEventListener('input', function() {
  const n = this.value.length;
  const el = document.getElementById('commentCounter');
  el.textContent = `${n} / 300`;
  el.className = 'char-counter' + (n >= 270 ? ' warn' : '');
});

// ════════════════════════════════════════════════
//  질문 제출 (addQuestion)
// ════════════════════════════════════════════════
async function submitQuestion() {
  const title   = document.getElementById('qTitle').value.trim();
  const content = document.getElementById('qContent').value.trim();
  if (!title)   { toast('제목을 입력해주세요.', 'warn'); return; }
  if (!content) { toast('내용을 입력해주세요.', 'warn'); return; }
  if (title.length > 50)   { toast('제목은 50자 이내로 입력해주세요.', 'warn'); return; }
  if (content.length > 600) { toast('내용은 600자 이내로 입력해주세요.', 'warn'); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = '심는 중…';
  btn.disabled = true;

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        authKey: AUTH_KEY,
        action:  'addQuestion',
        grade:   myInfo.grade,
        class:   myInfo.class,
        num:     myInfo.num,
        title,
        content
      })
    });
    const txt = await res.text();
    if (txt === 'Success') {
      document.getElementById('qTitle').value   = '';
      document.getElementById('qContent').value = '';
      document.getElementById('titleCounter').textContent   = '0 / 50';
      document.getElementById('contentCounter').textContent = '0 / 600';
      isMyMode = false;
      document.getElementById('toggleBtn').textContent = '내 질문만 보기';
      toast('질문이 심어졌어요! 🌱', 'success');
      goStep(3);
    } else {
      toast('오류: ' + txt, 'error');
    }
  } catch(e) {
    toast('서버 연결에 실패했습니다.', 'error');
  } finally {
    btn.textContent = '질문 제출하기';
    btn.disabled = false;
  }
}

// ════════════════════════════════════════════════
//  질문 목록 fetch
// ════════════════════════════════════════════════
async function fetchQuestions() {
  showLoading(true);
  try {
    const res = await fetch(SCRIPT_URL);
    allQuestions = await res.json();
    allQuestions.reverse(); // 최신순
    renderBoard();
  } catch(e) {
    toast('데이터 로딩에 실패했습니다.', 'error');
  } finally {
    setTimeout(() => showLoading(false), 300);
  }
}

// ════════════════════════════════════════════════
//  보드 렌더
// ════════════════════════════════════════════════
function toggleMyMode() {
  if (!myInfo.grade) {
    toast("먼저 학번을 선택해야 '내 질문'을 볼 수 있어요.", 'warn');
    return;
  }
  isMyMode = !isMyMode;
  document.getElementById('toggleBtn').textContent = isMyMode ? '전체 보기' : '내 질문만 보기';
  renderBoard();
}

function renderBoard() {
  const grid = document.getElementById('boardGrid');
  grid.innerHTML = '';

  // 백엔드 보안 패치: grade/class/num 필드는 응답에 없음 → filter 불가
  // 단, 내 모드일 때 myInfo 기반 title 검색이 불가하므로 서버에서 필터해줘야 함
  // 현재 백엔드가 id 기반으로만 응답하므로, myMode는 베스트 에포트로 처리
  let list = allQuestions;
  if (isMyMode) {
    // 백엔드 보안 패치로 grade/class/num 미포함 → 안내 메시지
    document.getElementById('countInfo').innerHTML =
      `<strong>내 질문</strong>을 필터하려면 동일 학번으로 제출한 질문을 찾아주세요.`;
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🔒</div>
      <p>보안 정책상 내 글 필터는<br>서버 측에서 처리됩니다.<br>준비 중이에요!</p>
    </div>`;
    return;
  }

  document.getElementById('countInfo').innerHTML =
    `질문 씨앗 <strong>${list.length}개</strong>`;

  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state">
      <div class="empty-state-icon">🌱</div>
      <p>아직 질문이 없어요. 첫 번째 씨앗을 심어보세요!</p>
    </div>`;
    return;
  }

  list.forEach(q => grid.appendChild(createCard(q)));
}

function createCard(q) {
  const card = document.createElement('div');
  card.className = 'card';
  const commentCount = (q.comments || []).length;
  card.innerHTML = `
    <div class="card-title">${escHtml(q.title)}</div>
    <div class="card-footer">
      <span class="like-pill">🌱 ${q.likes || 0}</span>
      ${commentCount > 0 ? `<span class="comment-pill">💬 ${commentCount}</span>` : ''}
    </div>
  `;
  card.onclick = () => openModal(q);
  return card;
}

function escHtml(str) {
  // 백엔드에서 이미 이스케이프됨 — 그러나 혹시 모를 경우 대비
  return String(str ?? '');
}

// ════════════════════════════════════════════════
//  싹추(좋아요) — addLike
// ════════════════════════════════════════════════
async function addLike() {
  if (!myInfo.grade) {
    toast('싹추를 주려면 학번 정보가 필요해요!', 'warn');
    return;
  }
  const btn = document.getElementById('modalLikeBtn');
  btn.textContent = '🌱 물 주는 중…';
  btn.disabled = true;

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({
        authKey:    AUTH_KEY,
        action:     'addLike',
        questionId: currentQ.id,
        userGrade:  myInfo.grade,
        userClass:  myInfo.class,
        userNum:    myInfo.num
      })
    });
    const txt = await res.text();
    if (txt === 'Already Liked') {
      toast('이미 싹추를 주셨습니다! 😅', 'warn');
    } else if (txt === 'Like Success') {
      currentQ.likes = Number(currentQ.likes || 0) + 1;
      btn.textContent = `🌱 싹추하기 (${currentQ.likes})`;
      renderBoard();
      toast('싹추 완료! 질문이 무럭무럭 🌱', 'success');
    } else {
      toast('오류: ' + txt, 'error');
    }
  } catch(e) {
    toast('서버 연결 실패.', 'error');
  } finally {
    btn.disabled = false;
    if (btn.textContent === '🌱 물 주는 중…')
      btn.textContent = `🌱 싹추하기 (${currentQ?.likes ?? 0})`;
  }
}

// ════════════════════════════════════════════════
//  댓글 신원 선택
// ════════════════════════════════════════════════
function selectWho(who) {
  commentWho = who;
  ['student','teacher','admin'].forEach(w => {
    document.getElementById('chip-' + w).classList.toggle('active', w === who);
  });
  document.getElementById('commentStudentFields').classList.toggle('show', who === 'student');
  document.getElementById('commentRoleField').classList.toggle('show', who !== 'student');
  document.getElementById('roleKey').value = '';
}

// ════════════════════════════════════════════════
//  댓글 제출 — addComment
// ════════════════════════════════════════════════
async function submitComment() {
  const text = document.getElementById('commentText').value.trim();
  if (!text) { toast('댓글을 입력해주세요.', 'warn'); return; }
  if (text.length > 300) { toast('댓글은 300자 이내로 입력해주세요.', 'warn'); return; }

  const payload = {
    authKey:    AUTH_KEY,
    action:     'addComment',
    questionId: currentQ.id,
    content:    text
  };

  if (commentWho === 'student') {
    const g = document.getElementById('cGrade').value;
    const c = document.getElementById('cClass').value;
    const n = document.getElementById('cNum').value;
    if (!g || !c || !n) { toast('학번을 모두 선택해주세요.', 'warn'); return; }
    payload.grade = g;
    payload.class = c;
    payload.num   = n;
  } else {
    const key = document.getElementById('roleKey').value.trim();
    if (!key) { toast('비밀번호를 입력해주세요.', 'warn'); return; }
    payload.roleKey = key;
  }

  const btn = document.getElementById('commentSubmitBtn');
  btn.textContent = '…';
  btn.disabled = true;

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const txt = await res.text();
    if (txt === 'Comment Success') {
      document.getElementById('commentText').value = '';
      document.getElementById('commentCounter').textContent = '0 / 300';
      toast('댓글이 달렸어요! 💬', 'success');
      // 로컬 반영 (optimistic)
      const newComment = {
        authorName: commentWho === 'student' ? '방금 게시됨' : (commentWho === 'teacher' ? '선생님 🌱' : '관리자 👑'),
        content: text,
        timestamp: new Date().toISOString()
      };
      currentQ.comments = currentQ.comments || [];
      currentQ.comments.push(newComment);
      renderComments(currentQ.comments);
    } else if (txt === 'Unauthorized') {
      toast('비밀번호가 틀렸습니다.', 'error');
    } else if (txt === 'Invalid Comment Length') {
      toast('댓글 길이를 확인해주세요.', 'warn');
    } else {
      toast('오류: ' + txt, 'error');
    }
  } catch(e) {
    toast('서버 연결 실패.', 'error');
  } finally {
    btn.textContent = '게시';
    btn.disabled = false;
  }
}

// ════════════════════════════════════════════════
//  댓글 렌더
// ════════════════════════════════════════════════
function renderComments(comments) {
  const list = document.getElementById('commentList');
  const cnt  = document.getElementById('commentCount');
  cnt.textContent = comments.length;

  if (!comments.length) {
    list.innerHTML = `<div class="comment-empty">아직 댓글이 없어요. 첫 댓글을 달아보세요!</div>`;
    return;
  }

  list.innerHTML = comments.map(c => {
    const isTeacher = String(c.authorName).includes('선생님');
    const isAdmin   = String(c.authorName).includes('관리자');
    const cls = isTeacher ? 'teacher' : (isAdmin ? 'admin' : '');
    return `
      <div class="comment-item ${cls}">
        <div class="comment-meta">
          <span class="comment-author">${escHtml(c.authorName)}</span>
          <span class="comment-ts">${fmtTime(c.timestamp)}</span>
        </div>
        <p class="comment-text">${escHtml(c.content)}</p>
      </div>
    `;
  }).join('');
}

// ════════════════════════════════════════════════
//  모달 열기 / 닫기
// ════════════════════════════════════════════════
function openModal(q) {
  currentQ = q;
  document.getElementById('modalTitle').textContent = q.title;
  document.getElementById('modalBody').textContent  = q.content;
  document.getElementById('modalLikeBtn').textContent = `🌱 싹추하기 (${q.likes || 0})`;
  document.getElementById('modalLikeBtn').disabled = false;

  // 댓글 초기화
  renderComments(q.comments || []);

  // 학번 자동 채우기 (로그인 상태면)
  if (myInfo.grade) {
    document.getElementById('cGrade').value = myInfo.grade;
    document.getElementById('cClass').value = myInfo.class;
    document.getElementById('cNum').value   = myInfo.num;
  }

  // who 칩 초기화
  selectWho('student');
  document.getElementById('commentText').value = '';
  document.getElementById('commentCounter').textContent = '0 / 300';

  const modal = document.getElementById('modal');
  modal.style.display = 'flex';
  document.getElementById('sheetBody').scrollTop = 0;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => modal.classList.add('show'));
  });
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  const modal = document.getElementById('modal');
  modal.classList.remove('show');
  setTimeout(() => {
    modal.style.display = 'none';
    document.body.style.overflow = '';
  }, 360);
}

function handleModalBgClick(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}

// ESC 닫기
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});
</script>
</body>
</html>
